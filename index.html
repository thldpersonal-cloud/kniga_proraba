<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F4F0;color:#1a1a1a;min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:260px;background:#1a1a1a;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-logo{padding:1.25rem 1rem 1rem;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
.logo-box{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:#E8A800;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#412402;flex-shrink:0;}
.logo-name{font-size:12px;font-weight:600;color:#fff;letter-spacing:0.04em;}
.logo-sub{font-size:9px;color:#666;letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}
.sidebar-book-title{padding:0.75rem 1rem 0.5rem;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0;}
.section-group{margin-bottom:2px;}
.section-header{display:flex;align-items:center;gap:8px;padding:8px 1rem;cursor:pointer;user-select:none;}
.section-header:hover{background:#252525;}
.section-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.section-num{font-size:10px;color:#555;width:14px;flex-shrink:0;}
.section-label{font-size:12px;color:#aaa;flex:1;line-height:1.3;}
.section-arrow{font-size:10px;color:#555;transition:transform 0.2s;flex-shrink:0;}
.section-group.open .section-arrow{transform:rotate(90deg);}
.reg-list{display:none;padding:2px 0 4px;}
.section-group.open .reg-list{display:block;}
.reg-item{display:flex;align-items:flex-start;gap:8px;padding:5px 1rem 5px 2rem;cursor:pointer;font-size:11px;color:#666;transition:background 0.15s;line-height:1.4;}
.reg-item:hover{background:#252525;color:#ccc;}
.reg-item.active{background:#2a2000;color:#E8A800;}
.reg-code{font-size:9px;color:#444;flex-shrink:0;min-width:36px;padding-top:1px;}
.main{flex:1;padding:1.5rem 2rem;overflow-y:auto;}
.page-sheet{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);overflow:hidden;margin-bottom:1rem;max-width:640px;}
.page-header{padding:1rem 1.25rem 0.875rem;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:3px solid #E8A800;}
.reg-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;margin-top:2px;flex-shrink:0;}
.page-title{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.3;}
.page-meta{font-size:11px;color:#999;margin-top:3px;}
.page-body{padding:1rem 1.25rem;}
.block{margin-bottom:1rem;}
.block-label{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.goal-box{background:#EFF6FF;border-left:3px solid #3B82F6;padding:8px 12px;font-size:13px;color:#1E40AF;line-height:1.55;}
.resp-row{display:flex;gap:6px;flex-wrap:wrap;}
.resp-chip{background:#F5F4F0;border:0.5px solid #ddd;border-radius:20px;padding:4px 10px;font-size:12px;color:#333;display:flex;align-items:center;gap:5px;}
.deadlines{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;}
.dl-card{background:#F5F4F0;border-radius:8px;padding:8px 10px;}
.dl-val{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.2;}
