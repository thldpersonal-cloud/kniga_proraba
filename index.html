.dr-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.dr-foot{padding:0.75rem 1rem;border-top:1px solid #222;flex-shrink:0;font-size:9px;color:#333;line-height:1.7;}

.divp-name{font-size:12px;flex:1;line-height:1.3;}
.divp-pg{font-size:10px;opacity:0.4;flex-shrink:0;}
.pnav{display:flex;gap:6px;margin-bottom:0.875rem;flex-wrap:wrap;}
.pnav-btn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:6px 11px;font-size:11px;color:#666;cursor:pointer;font-family:inherit;min-height:34px;}
.pnav-btn:hover,.pnav-btn:active{background:#F5F4F0;}
.pager{display:flex;gap:6px;margin-top:4px;padding-bottom:8px;}
.pg-btn{background:#fff;border:0.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:11px;color:#555;cursor:pointer;font-family:inherit;flex:1;line-height:1.4;}

function openD(){document.getElementById('overlay').classList.add('on');document.getElementById('drawer').classList.add('on');}
function closeD(){document.getElementById('overlay').classList.remove('on');document.getElementById('drawer').classList.remove('on');}

function buildNav(id){
  document.getElementById(id).innerHTML=SECTIONS.map(s=>
    '<div class="sec-group" id="'+id+'-'+s.id+'">'
    +'<div class="sec-head" onclick="togSec(''+id+'-'+s.id+'')">'
    +'<div class="sec-dot" style="background:'+s.color+'"></div>'
    +'<span class="sec-num">'+s.num+'</span>'
    +'<span class="sec-lbl">'+s.title+'</span>'
    +'<span class="sec-arr">&#9658;</span></div>'
    +'<div class="reg-list">'
    +s.regs.map(r=>'<div class="ri" id="'+id+'-r-'+r.id+'" onclick="goReg(''+s.id+'',''+r.id+'')">'
    +'<span class="ri-code">'+r.code+'</span><span class="ri-title">'+r.title+'</span></div>').join('')
    +'</div></div>').join('');
}

function buildBN(){
  document.getElementById('bottomnav').innerHTML='<div class="bn-inner">'
  +'<button class="bn-btn act" id="bn-home" onclick="goHome()"><span class="bn-icon">&#128214;</span><span class="bn-lbl">Обложка</span></button>'
  +SECTIONS.map(s=>'<button class="bn-btn" id="bn-'+s.id+'" onclick="goSec(''+s.id+'')">'
  +'<div class="bn-dot" style="background:'+s.color+'"></div>'
  +'<span class="bn-lbl">'+s.num+'. '+s.title.split(' ')[0]+'</span></button>').join('')
  +'</div>';
}

function togSec(gid){document.getElementById(gid).classList.toggle('open');}

function pwaHint(){
  var isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  var isAndroid=/android/.test(navigator.userAgent.toLowerCase());
  var isStandalone=window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches;
  if(isStandalone||localStorage.getItem('pwa-dismissed')) return '';
  if(isIOS) return '<div class="pwa-banner" id="pwa-b"><div class="logo-icon" style="width:40px;height:40px;font-size:13px;flex-shrink:0;">ТХ</div>'
    +'<div class="pwa-text"><div class="pwa-title">Добавить на экран домой</div>'
    +'<div class="pwa-sub">Нажмите &#9633;&#8593; внизу Safari → «На экран домой»</div></div>'
    +'<button class="pwa-close" onclick="dismissPWA()">✕</button></div>';
  if(isAndroid) return '<div class="pwa-banner" id="pwa-b"><div class="logo-icon" style="width:40px;height:40px;font-size:13px;flex-shrink:0;">ТХ</div>'
    +'<div class="pwa-text"><div class="pwa-title">Добавить на экран</div>'
    +'<div class="pwa-sub">Нажмите ⋮ в Chrome → «Добавить на главный экран»</div></div>'
    +'<button class="pwa-close" onclick="dismissPWA()">✕</button></div>';
  return '';
}
function dismissPWA(){localStorage.setItem('pwa-dismissed','1');var b=document.getElementById('pwa-b');if(b)b.remove();}

function rCover(){
  return pwaHint()
  +'<div class="cover"><div class="cover-stripe"></div><div class="cover-body">'
  +'<div class="logo-box" style="margin-bottom:1.375rem"><div class="logo-icon" style="width:38px;height:38px;font-size:13px">ТХ</div>'
  +'<div><div class="logo-name" style="font-size:13px">ТЕХНО ХОЛДИНГ</div><div class="logo-sub" style="color:#555">Строительная компания · Челябинск</div></div></div>'
  +'<div class="cover-div"></div><div class="cover-h">Книга<br>прораба</div>'
  +'<div class="cover-sub">Регламенты и стандарты работы · Версия 2.0 · 2026</div><div style="margin-bottom:1.375rem">'
  +SECTIONS.map(s=>'<div class="toc-item" onclick="goSec(''+s.id+')">'
  +'<div class="toc-dot" style="background:'+s.color+'"></div>'
  +'<span style="font-size:10px;color:#555;width:13px">'+s.num+'</span>'
  +'<span class="toc-lbl">'+s.title+'</span>'
  +'<span class="toc-pg">стр. '+s.pg+'</span></div>').join('')
  +'</div><div class="cover-bot">'
  +'<span style="font-size:10px;color:#555">Прораб: _______________________</span>'
  +'<span style="font-size:10px;color:#444">Дата: _________</span>'
  +'</div></div></div>'
  +'<div class="sign"><div style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:5px">Лист ознакомления</div>'
  +'<div style="font-size:11px;color:#777;line-height:1.6">Я, нижеподписавшийся, получил Книгу прораба версии 2.0 (2026), ознакомлен с содержанием всех регламентов и обязуюсь соблюдать установленные стандарты работы в ООО «ТехноХОЛДИНГ».</div>'
  +'<div class="sign-grid"><div class="sign-f"><div class="sign-fl">ФИО полностью</div></div>'
  +'<div class="sign-f"><div class="sign-fl">Подпись</div></div>'
  +'<div class="sign-f"><div class="sign-fl">Дата</div></div>'

function rDiv(s){
  return '<div class="divp" style="background:'+s.color+'">'
  +'<div class="divp-body"><div class="divp-n" style="color:#fff">'+s.num+'</div>'
  +'<div class="divp-t" style="color:#fff">'+s.title+'</div>'
  +'<div class="divp-s" style="color:#fff">стр. '+s.pg+'</div>'
  +s.regs.map(r=>'<div class="divp-ri" onclick="goReg(''+s.id+'',''+r.id+'')">'
  +'<span class="divp-code" style="color:#fff">'+r.code+'</span>'
  +'<span class="divp-name" style="color:#fff">'+r.title+'</span>'
  +'<span class="divp-pg" style="color:#fff">стр.'+r.page+'</span></div>').join('')
  +'</div></div>';
}

function rReg(s,r){
  var ac=s.color,tc=s.tc;
  return '<div class="card">'
  +'<div class="card-head" style="border-bottom-color:'+ac+'">'
  +'<div style="flex:1"><div class="card-title">'+r.title+'</div>'
  +'<div class="card-meta">Раздел '+s.num+' · '+s.title+'</div></div>'
  +'<div class="card-badge" style="background:'+ac+';color:'+tc+'">'+r.code+'</div></div>'
  +'<div class="card-body">'
  +'<div class="blk"><div class="blk-lbl">&#127919; Цель</div><div class="goal">'+r.goal+'</div></div>'
  +'<div class="blk"><div class="blk-lbl">&#128101; Ответственные</div><div class="chips">'
  +r.resp.map(x=>'<div class="chip"><span>'+x.i+'</span>'+x.l+'</div>').join('')+'</div></div>'
  +'<div class="blk"><div class="blk-lbl">&#9201; Сроки</div><div class="dls">'
  +r.deadlines.map(d=>'<div class="dl"><div class="dl-v">'+d.v+'</div><div class="dl-l">'+d.l+'</div></div>').join('')+'</div></div>'
  +'<div class="blk"><div class="blk-lbl">&#128203; Порядок действий</div>'
  +r.steps.map(function(st,i){return '<div class="step"><div class="step-n" style="background:'+ac+';color:'+tc+'">'+(i+1)+'</div>'
  +'<div style="flex:1"><div class="step-t">'+st.t+'</div>'+(st.h?'<div class="step-h">'+st.h+'</div>':'')+'</div></div>';}).join('')+'</div>'
  +'<div class="blk"><div class="blk-lbl">&#128196; Документы</div>'
  +r.docs.map(d=>'<div class="doc-row"><span style="font-size:13px;color:#ccc">&#128206;</span>'
  +'<span class="doc-n">'+d.n+'</span><span class="doc-t" style="background:'+d.bg+';color:'+d.tc+'">'+d.tag+'</span></div>').join('')+'</div>'
  +'<div class="warn"><span style="font-size:13px;flex-shrink:0;margin-top:1px">&#9888;&#65039;</span>'
  +'<span class="warn-t">'+r.warn+'</span></div>'
  +'</div><div class="card-foot"><span class="foot-t">Версия 2.0 · 2026</span><span class="foot-t">стр. '+r.page+'</span></div></div>';
}

function setHTML(html){document.getElementById('content').innerHTML=html;document.getElementById('main-scroll').scrollTop=0;closeD();}
function clrActive(){document.querySelectorAll('.ri').forEach(function(e){e.classList.remove('act');});document.querySelectorAll('.bn-btn').forEach(function(e){e.classList.remove('act');});}

function openSec(sid){
  ['sb-nav','dr-nav'].forEach(function(p){var el=document.getElementById(p+'-'+sid);if(el)el.classList.add('open');});
}

function goHome(){setHTML(rCover());clrActive();var b=document.getElementById('bn-home');if(b)b.classList.add('act');}

function goSec(sid){
  var s=SECTIONS.find(function(x){return x.id===sid;});
  setHTML(rDiv(s));clrActive();
  var b=document.getElementById('bn-'+sid);if(b)b.classList.add('act');
  openSec(sid);
}

function goReg(sid,rid){
  var s=SECTIONS.find(function(x){return x.id===sid;});
  var r=s.regs.find(function(x){return x.id===rid;});
  var all=[];
  SECTIONS.forEach(function(sec){sec.regs.forEach(function(rg){all.push({sid:sec.id,rid:rg.id,code:rg.code,title:rg.title});});});
  var idx=all.findIndex(function(x){return x.rid===rid;});
  var html='<div class="pnav">'
  +'<button class="pnav-btn" onclick="goHome()">&#8592; Обложка</button>'
  +'<button class="pnav-btn" onclick="goSec(''+sid+'')" style="color:'+s.color+';font-weight:600">'+s.num+'. '+s.title+'</button></div>';
  html+=rReg(s,r);
  html+='<div class="pager">';
  if(idx>0){var p=all[idx-1];html+='<button class="pg-btn" onclick="goReg(''+p.sid+'',''+p.rid+'')" style="text-align:left">&#8592; '+p.code+'<br><span style="color:#bbb;font-size:10px">'+p.title+'</span></button>';}
  if(idx<all.length-1){var n=all[idx+1];html+='<button class="pg-btn" onclick="goReg(''+n.sid+'',''+n.rid+'')" style="text-align:right">'+n.code+' &#8594;<br><span style="color:#bbb;font-size:10px">'+n.title+'</span></button>';}
  html+='</div>';
  setHTML(html);clrActive();
  ['sb-nav','dr-nav'].forEach(function(p){
    var el=document.getElementById(p+'-r-'+rid);if(el)el.classList.add('act');
    var sg=document.getElementById(p+'-'+sid);if(sg)sg.classList.add('open');
  });
  var b=document.getElementById('bn-'+sid);if(b)b.classList.add('act');
}

buildNav('sb-nav');
buildNav('dr-nav');
buildBN();
goHome();
document.getElementById('sb-nav-s1').classList.add('open');
